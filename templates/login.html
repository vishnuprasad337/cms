{% extends "base.html" %}
{% load static %}
{% block title %}
Hotel Login
{% endblock %}

{% block content %}

<div class="container">

<div class="login-box">

<h2>Hotel Login</h2>

<form method="POST" id="loginForm" onsubmit="return validateLogin()">

{% csrf_token %}

<input 
type="text" 
name="hotel_name" 
id="hotel_name"
placeholder="Enter Hotel Name"
onblur="capitalizeName()"
required>

<button type="submit">Login</button>

</form>

</div>

</div>

{% endblock %}
